<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QR Matrix Reader</title>
  <script src="jsQR.js"></script>
  <style>
    :root {
      --bg: #101416;
      --panel: #182024;
      --panel2: #0b1012;
      --ink: #f5fbff;
      --muted: #98a8af;
      --accent: #00bcd4;
      --accent2: #4dd0e1;
      --ok: #00e676;
      --warn: #ffb300;
      --bad: #ff5252;
      --line: #27343a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    .header {
      padding: 14px 16px;
      text-align: center;
      background: #142027;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
      letter-spacing: 0;
      box-shadow: 0 2px 12px rgba(0,0,0,.35);
      z-index: 5;
    }
    .camera {
      position: relative;
      flex: 1;
      min-height: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    video, #overlayCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    video { z-index: 1; }
    #overlayCanvas { z-index: 2; pointer-events: none; }
    #workCanvas { display: none; }
    #cameraControls {
      position: absolute;
      left: 0;
      bottom: calc(24px + env(safe-area-inset-bottom, 0px));
      width: 100%;
      z-index: 5;
      display: none;
      justify-content: center;
      gap: 12px;
      padding: 0 14px;
      pointer-events: none;
    }
    #zoomControls {
      position: absolute;
      right: 12px;
      top: 12px;
      z-index: 6;
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 8px;
      background: rgba(10,16,18,.72);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 6px 18px rgba(0,0,0,.35);
    }
    #zoomControls button {
      width: 40px;
      height: 40px;
      padding: 0;
      border-radius: 8px;
      font-size: 1.2rem;
    }
    #zoomLabel {
      min-width: 44px;
      text-align: center;
      color: var(--ink);
      font-size: .85rem;
      font-weight: 700;
    }
    #cameraControls button {
      pointer-events: auto;
      min-width: 132px;
      box-shadow: 0 6px 18px rgba(0,0,0,.42);
    }
    body.scanning .bottom { display: none; }
    body.scanning .camera { flex: 1 1 auto; }
    body.scanning #cameraControls,
    body.scanning #zoomControls { display: flex; }
    .bottom {
      padding: 14px 16px calc(14px + env(safe-area-inset-bottom, 0px));
      background: var(--panel);
      border-top: 1px solid var(--line);
      display: grid;
      gap: 10px;
      z-index: 4;
    }
    .status { color: var(--accent2); font-size: .94rem; text-align: center; min-height: 1.4em; }
    .phasebar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .phase {
      border: 1px solid var(--line);
      color: var(--muted);
      padding: 7px 4px;
      text-align: center;
      border-radius: 6px;
      font-size: .78rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .phase.active { border-color: var(--accent); color: var(--accent2); background: rgba(0,188,212,.08); }
    .btnrow { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    button {
      border: 0;
      border-radius: 8px;
      padding: 12px 18px;
      background: var(--accent);
      color: #062027;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary { background: #334047; color: var(--ink); }
    button:disabled { opacity: .45; cursor: default; }
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0,0,0,.86);
    }
    .box {
      width: min(540px, 100%);
      max-height: calc(100dvh - 36px);
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px;
      display: grid;
      gap: 12px;
      box-shadow: 0 16px 50px rgba(0,0,0,.45);
    }
    h2 { margin: 0; color: var(--accent2); font-size: 1.25rem; }
    p { margin: 0; color: var(--muted); line-height: 1.45; }
    input {
      width: 100%;
      border: 1px solid #3a4a50;
      background: #030506;
      color: var(--ink);
      border-radius: 8px;
      padding: 12px;
      font-size: 1.05rem;
      text-align: center;
    }
    .inlineCheck {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      font-size: .92rem;
    }
    .inlineCheck input {
      width: auto;
      margin: 0;
    }
    .card {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      display: grid;
      gap: 5px;
    }
    .card label { color: var(--muted); font-size: .78rem; }
    .text { word-break: break-all; font-family: ui-monospace, Consolas, monospace; white-space: pre-wrap; }
    .meta { color: var(--accent2); font-size: .82rem; }
    .ok { color: var(--ok); }
    .bad { color: var(--bad); }
    .warn { color: var(--warn); }
    .debug {
      max-height: 34dvh;
      overflow: auto;
      white-space: pre;
      word-break: normal;
      font-size: .78rem;
      line-height: 1.35;
      -webkit-overflow-scrolling: touch;
    }
    .logcount {
      color: var(--muted);
      text-align: center;
      font-size: .78rem;
    }
  </style>
</head>
<body>
  <div class="header">QR Matrix Reader</div>
  <div class="camera">
    <video id="camera" playsinline autoplay muted></video>
    <canvas id="overlayCanvas"></canvas>
    <canvas id="workCanvas"></canvas>
    <div id="zoomControls" aria-label="Zoom controls">
      <button id="zoomOutBtn" class="secondary" type="button">−</button>
      <div id="zoomLabel">1.0x</div>
      <button id="zoomInBtn" type="button">＋</button>
    </div>
    <div id="cameraControls">
      <button id="modeSwitchBtn" class="secondary" type="button">モード切替</button>
      <button id="cameraScanAgainBtn" type="button">もう一度スキャン</button>
    </div>
  </div>
  <div class="bottom">
    <div class="status" id="statusText">QRマトリックス専用リーダー</div>
    <div class="phasebar">
      <div id="stage1Pill" class="phase">Stage1 DM</div>
      <div id="prePill" class="phase">即時QR</div>
      <div id="stage3Pill" class="phase">Stage3 QR</div>
    </div>
    <div class="btnrow">
      <button id="startBtn">スキャン開始</button>
      <button id="stopBtn" class="secondary" disabled>停止</button>
      <button id="copyLogsBtn" class="secondary">蓄積ログコピー</button>
      <button id="clearLogsBtn" class="secondary">蓄積ログ消去</button>
      <button id="logoutBtn" class="secondary">端末情報変更</button>
    </div>
    <div id="debugLogCountLabel" class="logcount">蓄積ログ 0件</div>
  </div>

  <div id="loginScreen" class="overlay">
    <div class="box">
      <h2>読取端末情報</h2>
      <p>読取端末ID条件を判定するため、端末に紐づく情報を登録してください。</p>
      <input id="loginPhoneInput" type="tel" placeholder="携帯電話番号">
      <input id="loginEmailInput" type="email" placeholder="メールアドレス">
      <input id="loginUserNumberInput" type="text" placeholder="利用者番号">
      <label class="inlineCheck"><input id="rememberReaderId" type="checkbox">この端末情報を記憶する</label>
      <button id="loginBtn">登録して開始</button>
    </div>
  </div>

  <div id="passwordScreen" class="overlay">
    <div class="box">
      <h2>パスワード入力</h2>
      <div class="card">
        <label>DM部データ</label>
        <div id="passwordPreview" class="text">-</div>
      </div>
      <p>QR部のRS訂正済み暗号候補を検出しました。パスワード入力後、同じStage3 profileでQR部を復号します。</p>
      <input id="passwordInput" type="password" placeholder="Password">
      <button id="passwordOkBtn">復号する</button>
      <button id="passwordCancelBtn" class="secondary">キャンセル</button>
    </div>
  </div>

  <div id="resultScreen" class="overlay">
    <div class="box">
      <h2 id="resultTitle">読取結果</h2>
      <div class="card">
        <label>DM部</label>
        <div id="resultDm" class="text">-</div>
        <div id="resultDmMeta" class="meta"></div>
      </div>
      <div id="resultQrCard" class="card">
        <label>QR部</label>
        <div id="resultQr" class="text">-</div>
        <div id="resultQrMeta" class="meta"></div>
      </div>
      <div id="signatureCard" class="card" style="display:none;">
        <label>電子署名</label>
        <div id="signatureText" class="text">-</div>
      </div>
      <div class="card">
        <label>Scan Debug</label>
        <div id="resultTrace" class="text debug">-</div>
      </div>
      <button id="scanAgainBtn">もう一度スキャン</button>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const video = $("camera");
    const overlay = $("overlayCanvas");
    const octx = overlay.getContext("2d");
    const work = $("workCanvas");
    const wctx = work.getContext("2d", { willReadFrequently: true });

    let stream = null;
    let barcodeDetector = null;
    let isScanning = false;
    let isProcessing = false;
    let firstDM = null;
    let secondQR = null;
    let matrixProfile = null;
    let matrixCarrier = null;
    let savedEncryptedQr = null;
    let appMask = null;
    let trace = [];
    let frameNo = 0;

    const MAX_DIM_FAST = 960;
    const MAX_DIM_ALT = 720;
    const MATRIX_TIMEOUT_MS = 20000;
    const DEBUG_LOG_KEY = "qr_matrix_reader_debug_logs_v1";

    let scanStartedPerf = 0;
    let scanStartedIso = "";
    let timeoutTimer = null;
    let debugSavedForCurrentScan = false;
    let debugStats = null;
    let zoomState = null;
    let matrixConditionsChecked = false;
    let currentMatrixReadCountRecordedKey = null;

    const MATRIX_TERMINAL_PROFILE_KEY = "qr_matrix_terminal_profile_v1";
    const MATRIX_TERMINAL_REMEMBER_KEY = "qr_matrix_reader_remember_v1";
    const MATRIX_READ_COUNT_STORE_KEY = "qr_matrix_read_counts_v1";
    let currentTerminalHashes = [];
    let currentDevicePosition = null;
    let watchPositionId = null;
    let currentMunicipalityInfo = null;
    let currentMunicipalityPromise = null;

    function newDebugStats() {
      return {
        startedIso: new Date().toISOString(),
        outcome: "running",
        frames: { total: 0, stage1: 0, stage3: 0 },
        phases: {},
        events: [],
        profile: "-",
        dm: null,
        qr: null,
        timeoutMs: MATRIX_TIMEOUT_MS
      };
    }

    function fmtMs(v) {
      if (v === null || v === undefined || !Number.isFinite(v)) return "-";
      return Math.round(v) + "ms";
    }

    function recordEvent(text) {
      if (!debugStats) return;
      const elapsed = scanStartedPerf ? performance.now() - scanStartedPerf : 0;
      debugStats.events.push(`${fmtMs(elapsed)} ${text}`);
      if (debugStats.events.length > 120) debugStats.events.shift();
    }

    function recordPhase(label, elapsedMs, outcome = "attempt", detail = "") {
      if (!debugStats) return;
      const p = debugStats.phases[label] || { attempts: 0, success: 0, raw: 0, fail: 0, elapsed: 0, details: [] };
      p.attempts++;
      p.elapsed += Number(elapsedMs) || 0;
      if (outcome === "success") p.success++;
      else if (outcome === "raw") p.raw++;
      else if (outcome === "fail") p.fail++;
      if (detail) {
        p.details.push(detail);
        if (p.details.length > 8) p.details.shift();
      }
      debugStats.phases[label] = p;
    }

    function getDebugLogs() {
      try {
        const logs = JSON.parse(localStorage.getItem(DEBUG_LOG_KEY) || "[]");
        return Array.isArray(logs) ? logs : [];
      } catch (e) {
        return [];
      }
    }

    function setDebugLogs(logs) {
      localStorage.setItem(DEBUG_LOG_KEY, JSON.stringify(logs.slice(-200)));
      updateDebugLogCount();
    }

    function updateDebugLogCount() {
      const el = $("debugLogCountLabel");
      if (el) el.textContent = `蓄積ログ ${getDebugLogs().length}件`;
    }

    function summarizeMgmt(item) {
      if (!item) return "-";
      const mgmt = parseStandardMgmt(item.managementCode32 ?? item.managementCode, item.managementFlags16);
      if (!mgmt) return "mgmt=-";
      return `qrNo=${mgmt.qrNo} enc=${mgmt.encryptionBits.toString(2).padStart(2, "0")} type=${mgmt.dataTypeBits} same=${mgmt.sameDataFlag ? 1 : 0} readLimit=${mgmt.readLimitBits}`;
    }

    function buildDebugReport(outcome = "completed") {
      const total = scanStartedPerf ? performance.now() - scanStartedPerf : 0;
      if (debugStats) {
        debugStats.outcome = outcome;
        debugStats.totalMs = total;
        debugStats.profile = matrixProfile ? `${matrixProfile.kind} / ${matrixProfile.label}` : "-";
        debugStats.dm = firstDM ? summarizeMgmt(firstDM) : null;
        debugStats.qr = secondQR ? summarizeMgmt(secondQR) : null;
      }
      const s = debugStats || newDebugStats();
      const lines = [];
      lines.push("■ QR Matrix 読取デバッグ");
      lines.push(`開始: ${scanStartedIso || s.startedIso}`);
      lines.push(`結果: ${outcome}`);
      lines.push(`総経過: ${fmtMs(s.totalMs ?? total)} / フレーム total=${s.frames.total} Stage1=${s.frames.stage1} Stage3=${s.frames.stage3}`);
      lines.push(`profile: ${s.profile || "-"}`);
      lines.push(`DM: ${s.dm || "-"}`);
      lines.push(`QR: ${s.qr || "-"}`);
      if (matrixCarrier && matrixCarrier.rect) {
        const r = matrixCarrier.rect;
        lines.push(`carrierRect: sx=${Math.round(r.sx)} sy=${Math.round(r.sy)} sw=${Math.round(r.sw)} sh=${Math.round(r.sh)} phase=${matrixCarrier.phase || "-"}`);
      }
      lines.push("");
      lines.push("Phase集計:");
      const entries = Object.entries(s.phases);
      if (!entries.length) lines.push("  -");
      for (const [name, p] of entries) {
        const avg = p.attempts ? p.elapsed / p.attempts : 0;
        lines.push(`  ${name}: attempts=${p.attempts} success=${p.success} raw=${p.raw} fail=${p.fail} total=${fmtMs(p.elapsed)} avg=${fmtMs(avg)}`);
        for (const d of p.details) lines.push(`    - ${d}`);
      }
      lines.push("");
      lines.push("Events:");
      if (!s.events.length) lines.push("  -");
      for (const e of s.events) lines.push(`  ${e}`);
      return lines.join("\n");
    }

    function saveDebugLog(outcome, report) {
      if (debugSavedForCurrentScan) return;
      debugSavedForCurrentScan = true;
      const logs = getDebugLogs();
      logs.push({
        at: new Date().toISOString(),
        outcome,
        totalMs: debugStats && debugStats.totalMs,
        profile: debugStats && debugStats.profile,
        report
      });
      setDebugLogs(logs);
    }

    async function copyTextToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return true;
      }
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      return ok;
    }

    async function copyAllDebugLog() {
      const logs = getDebugLogs();
      if (!logs.length) {
        alert("No accumulated debug logs.");
        return;
      }
      const text = `QR Matrix debug logs count: ${logs.length} / exported: ${new Date().toISOString()}\n\n` +
        logs.map((l, i) => `===== #${i + 1} ${l.at || ""} / ${l.outcome || ""} =====\n${l.report || ""}`).join("\n\n");
      try {
        await copyTextToClipboard(text);
        alert("Debug logs copied.");
      } catch (e) {
        alert("Clipboard copy failed.");
      }
    }

    function clearDebugLog() {
      if (!confirm("Clear accumulated debug logs?")) return;
      setDebugLogs([]);
      alert("Debug logs cleared.");
    }

    function clearScanTimeout() {
      if (timeoutTimer) {
        clearTimeout(timeoutTimer);
        timeoutTimer = null;
      }
    }

    function startScanTimeout() {
      clearScanTimeout();
      timeoutTimer = setTimeout(() => {
        finishWithTimeout();
      }, MATRIX_TIMEOUT_MS);
    }

      const mgmt = firstDM ? parseStandardMgmt(firstDM.managementCode32 ?? firstDM.managementCode, firstDM.managementFlags16) : null;
      $("resultTitle").textContent = "QR Matrix 読取タイムアウト";
      $("resultDm").textContent = firstDM ? firstDM.text : "-";
      $("resultQr").textContent = secondQR ? secondQR.text : "-";
      $("resultDmMeta").textContent = mgmt ? `種別=${matrixProfile ? matrixProfile.label : "-"} / readLimit=${mgmt.readLimitBits}` : "";
      $("resultQrMeta").textContent = secondQR && secondQR.version ? `version=${secondQR.version.versionNumber || secondQR.version}` : "第2QR未確定";
      $("signatureCard").style.display = "none";
      $("resultTrace").textContent = report;

    function finishWithTimeout() {
      if (!isScanning && !isProcessing) return;
      isScanning = false;
      isProcessing = false;
      clearScanTimeout();
      setStage(null);
      drawOverlay();
      setStatus("20s timeout");
      recordEvent("timeout");
      const report = buildDebugReport("timeout");
      saveDebugLog("timeout", report);
      const mgmt = firstDM ? parseStandardMgmt(firstDM.managementCode32 ?? firstDM.managementCode, firstDM.managementFlags16) : null;
      $("resultTitle").textContent = "QR Matrix timeout";
      $("resultDm").textContent = firstDM ? firstDM.text : "-";
      $("resultQr").textContent = secondQR ? secondQR.text : "-";
      $("resultQrCard").style.display = "";
      $("resultDmMeta").textContent = mgmt ? `profile=${matrixProfile ? matrixProfile.label : "-"} / readLimit=${mgmt.readLimitBits}` : "";
      $("resultQrMeta").textContent = secondQR && secondQR.version ? `version=${secondQR.version.versionNumber || secondQR.version}` : "M2 QR not fixed";
      $("signatureCard").style.display = "none";
      $("resultTrace").textContent = report;
      $("resultScreen").style.display = "flex";
      setScanUiActive(false);
      $("startBtn").disabled = false;
      $("stopBtn").disabled = true;
    }

    function setStatus(text) { $("statusText").textContent = text; }
    function setStage(active) {
      $("stage1Pill").classList.toggle("active", active === "stage1");
      $("prePill").classList.toggle("active", active === "pre");
      $("stage3Pill").classList.toggle("active", active === "stage3");
    }
    function setScanUiActive(active) {
      document.body.classList.toggle("scanning", !!active);
      const controls = $("cameraControls");
      const zoomControls = $("zoomControls");
      if (controls) controls.style.display = active ? "flex" : "none";
      if (zoomControls) zoomControls.style.display = active ? "flex" : "none";
    }
    function addTrace(line) {
      trace.push(`${String(trace.length + 1).padStart(2, "0")} ${line}`);
      if (trace.length > 80) trace.shift();
    }

    function getManagementCode32FromParts(managementCode, managementFlags16 = null) {
      if (managementCode === undefined || managementCode === null) return null;
      if ((managementCode >>> 0) > 0xFFFF) return managementCode >>> 0;
      if (managementFlags16 === undefined || managementFlags16 === null) return null;
      return ((((managementCode & 0xFFFF) << 16) | (managementFlags16 & 0xFFFF)) >>> 0);
    }

    function parseStandardMgmt(managementCode, managementFlags16 = null) {
      const managementCode32 = getManagementCode32FromParts(managementCode, managementFlags16);
      if (managementCode32 === null) return null;
      const high = (managementCode32 >>> 16) & 0xFFFF;
      const low = managementCode32 & 0xFFFF;
      return {
        qrNo: (high >>> 14) & 0x3,
        colorCountBits: (high >>> 12) & 0x3,
        dataCompBits: (high >>> 2) & 0x3,
        regionIndexBits: high & 0x3,
        sameDataFlag: ((low >>> 15) & 1) === 1,
        encryptionBits: (low >>> 13) & 0x3,
        sysEncFlag: ((low >>> 14) & 1) === 1,
        appEncFlag: ((low >>> 13) & 1) === 1,
        dataTypeBits: (low >>> 10) & 0x7,
        hasDateTime: (low & 0x0200) !== 0,
        hasExpiry: (low & 0x0100) !== 0,
        hasReaderId: (low & 0x0080) !== 0,
        hasLocation: (low & 0x0020) !== 0,
        hasMunicipality: (low & 0x0010) !== 0,
        readLimitBits: (low >>> 2) & 0x3
      };
    }

    function hasValue(value) {
      return value !== undefined && value !== null;
    }

    function hashReaderId32(readerId) {
      let hash = 0x811c9dc5;
      const text = String(readerId || "");
      for (let i = 0; i < text.length; i++) {
        hash ^= text.charCodeAt(i);
        hash = Math.imul(hash, 0x01000193) >>> 0;
      }
      return hash >>> 0;
    }

    function checkExpiry(expiryExt32) {
      const year = ((expiryExt32 >>> 28) & 0xF) + 2026;
      const month = (expiryExt32 >>> 24) & 0xF;
      const day = (expiryExt32 >>> 19) & 0x1F;
      const hour = (expiryExt32 >>> 14) & 0x1F;
      const minute = (expiryExt32 >>> 8) & 0x3F;
      const second = (expiryExt32 >>> 2) & 0x3F;
      if (month === 0) return true;
      const expiryDate = new Date(year, month - 1, day || 1, hour, minute, second);
      return new Date() <= expiryDate;
    }

    function updateCurrentDevicePosition(pos) {
      const nextPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      if (!currentDevicePosition ||
          Math.abs(currentDevicePosition.lat - nextPosition.lat) > 0.001 ||
          Math.abs(currentDevicePosition.lon - nextPosition.lon) > 0.001) {
        currentMunicipalityInfo = null;
        currentMunicipalityPromise = null;
      }
      currentDevicePosition = nextPosition;
      primeMunicipalityInfo();
    }

    function startWatchingPosition() {
      if (!navigator.geolocation || watchPositionId !== null) return;
      watchPositionId = navigator.geolocation.watchPosition(
        pos => updateCurrentDevicePosition(pos),
        err => recordEvent(`geolocation watch failed: ${err && err.message ? err.message : "error"}`),
        { enableHighAccuracy: true, maximumAge: 5000 }
      );
    }

    function matchLocation(qrLat, qrLon, devLat, devLon) {
      const latDiff = Math.abs(devLat - qrLat);
      const cosLat = Math.cos(qrLat * Math.PI / 180);
      const lonThreshold = cosLat > 0 ? 0.0009 / cosLat : 0.0009;
      const lonDiff = Math.abs(devLon - qrLon);
      return latDiff <= 0.0009 && lonDiff <= lonThreshold;
    }

    function checkLocation(latExt24, lonExt24) {
      const qrLat = (latExt24 / 10000) - 90;
      const qrLon = (lonExt24 / 10000) - 180;
      if (currentDevicePosition) {
        return Promise.resolve(matchLocation(qrLat, qrLon, currentDevicePosition.lat, currentDevicePosition.lon));
      }
      return new Promise(resolve => {
        if (!navigator.geolocation) { resolve(false); return; }
        navigator.geolocation.getCurrentPosition(
          pos => {
            updateCurrentDevicePosition(pos);
            resolve(matchLocation(qrLat, qrLon, currentDevicePosition.lat, currentDevicePosition.lon));
          },
          () => resolve(false),
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 5000 }
        );
      });
    }

    function normalizeMuniCd5(value) {
      const digits = String(value || "").replace(/\D/g, "");
      if (!digits) return "";
      return digits.padStart(5, "0").slice(-5);
    }

    function normalizeQrMunicipalityCode(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return "";
      return String(numeric >>> 0).padStart(6, "0").slice(-6);
    }

    function getQrMunicipalityScope(code6) {
      if (code6 === "000000" || code6 === "900001" || code6 === "900002") return "country";
      if (/^\d{2}0000$/.test(code6)) return "prefecture";
      return "municipality";
    }

    const DESIGNATED_CITY_WARD_MAX = {
      "01100": 10, "04100": 5, "11100": 10, "12100": 6,
      "14100": 18, "14130": 7, "14150": 3, "15100": 8,
      "22100": 3, "22130": 7, "23100": 16, "26100": 11,
      "27100": 24, "27140": 7, "28100": 9, "33100": 4,
      "34100": 8, "40100": 7, "40130": 7, "43100": 5
    };

    function matchesDesignatedCityWard(qrCode5, apiMuniCd) {
      if (!qrCode5 || qrCode5.length !== 5 || !apiMuniCd || apiMuniCd.length !== 5) return false;
      const wardMax = DESIGNATED_CITY_WARD_MAX[qrCode5];
      if (wardMax === undefined) return false;
      const qrNum = parseInt(qrCode5, 10);
      const apiNum = parseInt(apiMuniCd, 10);
      if (!Number.isFinite(qrNum) || !Number.isFinite(apiNum)) return false;
      return apiNum === qrNum || (apiNum >= qrNum + 1 && apiNum <= qrNum + wardMax);
    }

    function isPositionInCountryCode(countryCode, pos) {
      if (!pos) return false;
      const lat = pos.lat;
      const lon = pos.lon;
      if (countryCode === "000000") return lat >= 20 && lat <= 46 && lon >= 122 && lon <= 154;
      if (countryCode === "900001") {
        return (lat >= 24 && lat <= 50 && lon >= -125 && lon <= -66) ||
          (lat >= 51 && lat <= 72 && lon >= -170 && lon <= -129) ||
          (lat >= 18 && lat <= 23 && lon >= -161 && lon <= -154);
      }
      if (countryCode === "900002") return lat >= 18 && lat <= 54 && lon >= 73 && lon <= 135;
      return false;
    }

    function getCurrentPositionFast() {
      if (currentDevicePosition) return Promise.resolve(currentDevicePosition);
      return new Promise(resolve => {
        if (!navigator.geolocation) { resolve(null); return; }
        navigator.geolocation.getCurrentPosition(
          pos => { updateCurrentDevicePosition(pos); resolve(currentDevicePosition); },
          () => resolve(null),
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 5000 }
        );
      });
    }

    function primeMunicipalityInfo() {
      if (!currentDevicePosition || currentMunicipalityInfo || currentMunicipalityPromise) return currentMunicipalityPromise;
      const lat = currentDevicePosition.lat;
      const lon = currentDevicePosition.lon;
      const apiUrl = "https://mreversegeocoder.gsi.go.jp/reverse-geocoder/LonLatToAddress?lat=" +
        encodeURIComponent(lat) + "&lon=" + encodeURIComponent(lon);
      currentMunicipalityPromise = fetch(apiUrl)
        .then(response => response.ok ? response.json() : null)
        .then(data => {
          const muniCd = data && data.results ? normalizeMuniCd5(data.results.muniCd) : "";
          currentMunicipalityInfo = muniCd ? { muniCd } : null;
          return currentMunicipalityInfo;
        })
        .catch(() => null)
        .finally(() => { currentMunicipalityPromise = null; });
      return currentMunicipalityPromise;
    }

    async function getCurrentMunicipalityInfo() {
      if (currentMunicipalityInfo) return currentMunicipalityInfo;
      const pos = await getCurrentPositionFast();
      if (!pos) return null;
      return await primeMunicipalityInfo();
    }

    async function checkMunicipality(municipalityExt24) {
      const qrCode6 = normalizeQrMunicipalityCode(municipalityExt24);
      if (!qrCode6) return false;
      const scope = getQrMunicipalityScope(qrCode6);
      const pos = await getCurrentPositionFast();
      if (!pos) return false;
      if (scope === "country") return isPositionInCountryCode(qrCode6, pos);
      const info = await getCurrentMunicipalityInfo();
      const apiMuniCd = info ? normalizeMuniCd5(info.muniCd) : "";
      if (!apiMuniCd) return false;
      if (scope === "prefecture") return qrCode6.substring(0, 2) === apiMuniCd.substring(0, 2);
      const qrCode5 = qrCode6.substring(0, 5);
      const legacyQrCode5 = normalizeMuniCd5(municipalityExt24);
      if (qrCode5 === apiMuniCd || legacyQrCode5 === apiMuniCd) return true;
      if (matchesDesignatedCityWard(qrCode5, apiMuniCd)) return true;
      if (matchesDesignatedCityWard(legacyQrCode5, apiMuniCd)) return true;
      return false;
    }

    function normalizeTerminalValue(value) {
      return String(value || "").trim();
    }

    function uniqueTerminalValues(values) {
      const seen = new Set();
      return values
        .map(normalizeTerminalValue)
        .filter(Boolean)
        .filter(value => {
          if (seen.has(value)) return false;
          seen.add(value);
          return true;
        });
    }

    function buildPhoneNumberCandidates(phoneNumber) {
      const raw = normalizeTerminalValue(phoneNumber);
      if (!raw) return [];
      const compact = raw.replace(/[^\d+]/g, "");
      const digits = raw.replace(/\D/g, "");
      const candidates = [raw, compact, digits];
      if (compact.startsWith("+81") && compact.length > 3) candidates.push("0" + compact.slice(3));
      if (digits.startsWith("81") && digits.length > 2) {
        candidates.push("0" + digits.slice(2));
        candidates.push("+" + digits);
      }
      if (digits.startsWith("0") && digits.length > 1) {
        candidates.push("+81" + digits.slice(1));
        candidates.push("81" + digits.slice(1));
      }
      let domesticDigits = "";
      if (digits.startsWith("0")) domesticDigits = digits;
      else if (digits.startsWith("81") && digits.length > 2) domesticDigits = "0" + digits.slice(2);
      if (domesticDigits.length === 11) {
        const carrier = domesticDigits.slice(0, 3);
        const middle = domesticDigits.slice(3, 7);
        const last = domesticDigits.slice(7);
        const intlCarrier = domesticDigits.slice(1, 3);
        candidates.push(`${carrier}-${middle}-${last}`);
        candidates.push(`${carrier} ${middle} ${last}`);
        candidates.push(`+81-${intlCarrier}-${middle}-${last}`);
        candidates.push(`+81 ${intlCarrier} ${middle} ${last}`);
      }
      return uniqueTerminalValues(candidates);
    }

    function getTerminalProfile() {
      return {
        phone: $("loginPhoneInput") ? $("loginPhoneInput").value.trim() : "",
        email: $("loginEmailInput") ? $("loginEmailInput").value.trim() : "",
        userNumber: $("loginUserNumberInput") ? $("loginUserNumberInput").value.trim() : ""
      };
    }

    function setTerminalProfile(profile = {}) {
      if ($("loginPhoneInput")) $("loginPhoneInput").value = profile.phone || "";
      if ($("loginEmailInput")) $("loginEmailInput").value = profile.email || "";
      if ($("loginUserNumberInput")) $("loginUserNumberInput").value = profile.userNumber || "";
    }

    function buildTerminalHashes(profile) {
      const values = uniqueTerminalValues([
        ...buildPhoneNumberCandidates(profile.phone),
        profile.email,
        profile.userNumber
      ]);
      return values.map(value => hashReaderId32(value));
    }

    function matchesRegisteredTerminalId(readerIdExt32) {
      if (!hasValue(readerIdExt32)) return true;
      return currentTerminalHashes.some(hash => (hash >>> 0) === (readerIdExt32 >>> 0));
    }

    function getReadLimitFromItem(item) {
      if (!item) return 0;
      if (hasValue(item.readLimitBits)) return item.readLimitBits & 0x3;
      const mgmt = parseStandardMgmt(item.managementCode32 ?? item.managementCode, item.managementFlags16);
      return mgmt ? (mgmt.readLimitBits & 0x3) : 0;
    }

    function getReadCountKey(item) {
      const limit = getReadLimitFromItem(item);
      if (!limit) return "";
      const managementCode32 = getManagementCode32FromParts(item.managementCode32 ?? item.managementCode, item.managementFlags16) || 0;
      const fingerprintSource = Array.isArray(item.codewords)
        ? item.codewords.join(",")
        : String(item.text || item.data || "");
      const dataHash = hashReaderId32(fingerprintSource);
      const uniquePart = hasValue(item.qrTwinUniqueId8) ? String(item.qrTwinUniqueId8 & 0xFF) : "noid";
      return ["matrix-v1", uniquePart, managementCode32 >>> 0, dataHash >>> 0].join(":");
    }

    function loadReadCountStore() {
      try {
        return JSON.parse(localStorage.getItem(MATRIX_READ_COUNT_STORE_KEY) || "{}") || {};
      } catch (e) {
        return {};
      }
    }

    function saveReadCountStore(store) {
      localStorage.setItem(MATRIX_READ_COUNT_STORE_KEY, JSON.stringify(store || {}));
    }

    function checkReadCountLimit(item) {
      const limit = getReadLimitFromItem(item);
      if (!limit) return { ok: true, limit: 0, count: 0, key: "" };
      const key = getReadCountKey(item);
      if (!key) return { ok: true, limit: 0, count: 0, key: "" };
      const store = loadReadCountStore();
      const entry = store[key] || {};
      const count = Math.max(0, parseInt(entry.count, 10) || 0);
      if (count >= limit) {
        return { ok: false, limit, count, key, message: "読み取り回数が上限に達しました" };
      }
      return { ok: true, limit, count, key };
    }

    function recordReadCountIfNeeded(item) {
      const check = checkReadCountLimit(item);
      if (!check.ok || !check.limit || !check.key) return;
      if (currentMatrixReadCountRecordedKey === check.key) return;
      const store = loadReadCountStore();
      const entry = store[check.key] || {};
      const nextCount = Math.max(0, parseInt(entry.count, 10) || 0) + 1;
      store[check.key] = {
        count: nextCount,
        limit: check.limit,
        qrTwinUniqueId8: hasValue(item.qrTwinUniqueId8) ? (item.qrTwinUniqueId8 & 0xFF) : null,
        lastReadAt: new Date().toISOString()
      };
      saveReadCountStore(store);
      currentMatrixReadCountRecordedKey = check.key;
      recordEvent(`read count recorded ${nextCount}/${check.limit}`);
    }

    async function ensureMatrixConditionsAllowed(item) {
      if (!item) return { ok: false, message: "DM部が未確定です" };
      if (hasValue(item.expiryExt32) && !checkExpiry(item.expiryExt32)) {
        return { ok: false, message: "読み取りの有効期間が終了しました" };
      }
      if (hasValue(item.readerIdExt32) && !matchesRegisteredTerminalId(item.readerIdExt32)) {
        return { ok: false, message: "読取端末IDが一致しません" };
      }
      if (hasValue(item.locationLatExt24) && hasValue(item.locationLonExt24)) {
        const ok = await checkLocation(item.locationLatExt24, item.locationLonExt24);
        if (!ok) return { ok: false, message: "読取位置が一致しません" };
      }
      if (hasValue(item.municipalityExt24)) {
        const ok = await checkMunicipality(item.municipalityExt24);
        if (!ok) return { ok: false, message: "市町村コードが一致しません" };
      }
      const readCount = checkReadCountLimit(item);
      if (!readCount.ok) return { ok: false, message: readCount.message || "読み取り回数が上限に達しました" };
      return { ok: true };
    }

    function doLogin() {
      const profile = getTerminalProfile();
      if (!profile.phone && !profile.email && !profile.userNumber) {
        alert("携帯電話番号、メールアドレス、利用者番号のいずれかを入力してください。");
        return;
      }
      currentTerminalHashes = buildTerminalHashes(profile);
      const remember = $("rememberReaderId") && $("rememberReaderId").checked;
      if (remember) {
        localStorage.setItem(MATRIX_TERMINAL_PROFILE_KEY, JSON.stringify(profile));
        localStorage.setItem(MATRIX_TERMINAL_REMEMBER_KEY, "1");
      } else {
        localStorage.removeItem(MATRIX_TERMINAL_PROFILE_KEY);
        localStorage.removeItem(MATRIX_TERMINAL_REMEMBER_KEY);
      }
      if ($("loginScreen")) $("loginScreen").style.display = "none";
    }

    function doLogout() {
      currentTerminalHashes = [];
      localStorage.removeItem(MATRIX_TERMINAL_PROFILE_KEY);
      localStorage.removeItem(MATRIX_TERMINAL_REMEMBER_KEY);
      setTerminalProfile({});
      if ($("rememberReaderId")) $("rememberReaderId").checked = false;
      if ($("loginScreen")) $("loginScreen").style.display = "flex";
    }

    function initLogin() {
      const saved = localStorage.getItem(MATRIX_TERMINAL_PROFILE_KEY);
      const remember = localStorage.getItem(MATRIX_TERMINAL_REMEMBER_KEY);
      if (saved && remember === "1") {
        try {
          const profile = JSON.parse(saved);
          setTerminalProfile(profile);
          currentTerminalHashes = buildTerminalHashes(profile);
          if ($("rememberReaderId")) $("rememberReaderId").checked = true;
          if (currentTerminalHashes.length) return;
        } catch (e) {
          localStorage.removeItem(MATRIX_TERMINAL_PROFILE_KEY);
        }
      }
      if ($("loginScreen")) $("loginScreen").style.display = "flex";
    }

    function itemFromDM(dm) {
      return {
        text: dm.text || dm.data || "",
        data: dm.text || dm.data || "",
        managementCode: dm.managementCode,
        managementCode32: dm.managementCode32,
        managementFlags16: dm.managementFlags16,
        managementExt32: dm.managementExt32,
        creationDateTimeExt32: dm.creationDateTimeExt32,
        expiryExt32: dm.expiryExt32,
        readerIdExt32: dm.readerIdExt32,
        locationLatExt24: dm.locationLatExt24,
        locationLonExt24: dm.locationLonExt24,
        municipalityExt24: dm.municipalityExt24,
        qrTwinUniqueId8: dm.qrTwinUniqueId8,
        codewords: dm.codewords,
        dataBytes: dm.dataBytes,
        symbolSize: dm.symbolSize,
        finderScore: dm.finderScore
      };
    }

    function qrPoints(qr, map = p => p) {
      const l = qr && qr.location;
      if (!l) return null;
      return [
        map(l.topLeftCorner),
        map(l.topRightCorner),
        map(l.bottomRightCorner),
        map(l.bottomLeftCorner)
      ];
    }

    function mapQrLocation(qr, map) {
      if (!qr || !qr.location) return qr;
      const l = qr.location;
      const out = { ...qr, location: { ...l } };
      for (const key of [
        "topLeftCorner",
        "topRightCorner",
        "bottomRightCorner",
        "bottomLeftCorner",
        "topLeftFinderPattern",
        "topRightFinderPattern",
        "bottomLeftFinderPattern",
        "bottomRightAlignmentPattern"
      ]) {
        if (l[key]) out.location[key] = map(l[key]);
      }
      return out;
    }

    function itemFromQR(qr, map = p => p) {
      return {
        text: qr.data || qr.text || "",
        data: qr.data || qr.text || "",
        managementCode: qr.managementCode,
        managementCode32: qr.managementCode32,
        managementFlags16: qr.managementFlags16,
        managementExt32: qr.managementExt32,
        creationDateTimeExt32: qr.creationDateTimeExt32,
        expiryExt32: qr.expiryExt32,
        readerIdExt32: qr.readerIdExt32,
        locationLatExt24: qr.locationLatExt24,
        locationLonExt24: qr.locationLonExt24,
        municipalityExt24: qr.municipalityExt24,
        codewords: qr.codewords,
        dataBytes: qr.dataBytes,
        version: qr.version,
        dimension: qr.dimension,
        location: qr.location,
        points: qrPoints(qr, map)
      };
    }

    function buildMatrixProfile(mgmt) {
      if (mgmt && mgmt.appEncFlag) {
        if (appMask) {
          return {
            kind: "appenc",
            label: "app encrypted",
            optsList: [{ sysEncDecode: true, appEncMask: Array.from(appMask), multi: true }]
          };
        }
        return {
          kind: "appenc-raw",
          label: "app encrypted raw",
          optsList: [{ sysEncDecode: true, captureAppEncDataBytes: true, multi: true }],
          acceptRawAppEnc: true
        };
      }
      if (mgmt && mgmt.sysEncFlag && mgmt.dataTypeBits === 2) {
        return { kind: "digitalsign", label: "digital signature", optsList: [{ sysEncDecode: true, multi: true }] };
      }
      if (mgmt && mgmt.sysEncFlag) {
        return { kind: "sysenc", label: "system encrypted", optsList: [{ sysEncDecode: true, multi: true }] };
      }
      return { kind: "normal", label: "normal", optsList: [{ multi: true }] };
    }

    function drawQuad(points, color) {
      if (!points || points.length !== 4) return;
      octx.strokeStyle = color;
      octx.lineWidth = 4;
      octx.beginPath();
      octx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < 4; i++) octx.lineTo(points[i].x, points[i].y);
      octx.closePath();
      octx.stroke();
    }

    function drawOverlay() {
      if (!video.videoWidth) return;
      overlay.width = video.videoWidth;
      overlay.height = video.videoHeight;
      octx.clearRect(0, 0, overlay.width, overlay.height);
      drawQuad(matrixCarrier && matrixCarrier.points, "#00bcd4");
      drawQuad(secondQR && secondQR.points, "#00e676");
    }

    function cropVideo(rect) {
      const sx = Math.max(0, Math.floor(rect.sx));
      const sy = Math.max(0, Math.floor(rect.sy));
      const sw = Math.min(video.videoWidth - sx, Math.ceil(rect.sw));
      const sh = Math.min(video.videoHeight - sy, Math.ceil(rect.sh));
      if (sw <= 24 || sh <= 24) return null;
      work.width = sw;
      work.height = sh;
      wctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);
      return { imageData: wctx.getImageData(0, 0, sw, sh), width: sw, height: sh, map: p => ({ x: p.x + sx, y: p.y + sy }), rect: { sx, sy, sw, sh } };
    }

    function frameAt(maxDim) {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      const scale = Math.min(1, maxDim / Math.max(vw, vh));
      const w = Math.max(1, Math.round(vw * scale));
      const h = Math.max(1, Math.round(vh * scale));
      work.width = w;
      work.height = h;
      wctx.drawImage(video, 0, 0, vw, vh, 0, 0, w, h);
      const inv = 1 / scale;
      return { imageData: wctx.getImageData(0, 0, w, h), width: w, height: h, map: p => ({ x: p.x * inv, y: p.y * inv }), rect: { sx: 0, sy: 0, sw: vw, sh: vh } };
    }

    function candidateArea(qr) {
      const pts = qrPoints(qr);
      if (!pts) return 0;
      let area = 0;
      for (let i = 0; i < 4; i++) {
        const a = pts[i], b = pts[(i + 1) % 4];
        area += a.x * b.y - b.x * a.y;
      }
      return Math.abs(area / 2);
    }

    function collectQRCandidates(src, profile) {
      const passes = [{ multi: true, extractRawForFailed: true, singleLocate: false }];
      if (profile && profile.optsList) {
        for (const opt of profile.optsList) passes.push({ ...opt, extractRawForFailed: true, singleLocate: false });
      } else {
        passes.push({ multi: true, extractRawForFailed: true, sysEncDecode: true, singleLocate: false });
      }
      const found = new Map();
      for (const opt of passes) {
        let res = null;
        const t0 = performance.now();
        const probeCollector = [];
        opt.debugProbe = true;
        opt.probeCollector = probeCollector;
        try { res = jsQR(src.imageData.data, src.width, src.height, opt); } catch (e) { res = null; }
        const elapsed = performance.now() - t0;
        const list = Array.isArray(res) ? res : (res ? [res] : []);
        recordPhase("QR locator/probe", elapsed, list.length ? "success" : "fail",
          `src=${src.width}x${src.height} opts=${opt.sysEncDecode ? "sysenc" : (opt.appEncMask ? "appmask" : "plain")} candidates=${list.length} probes=${probeCollector.length || 0}`);
        for (const qr of list) {
          if (!qr || !qr.location) continue;
          const pts = qrPoints(qr);
          const cx = Math.round(pts.reduce((a, p) => a + p.x, 0) / 4 / 12);
          const cy = Math.round(pts.reduce((a, p) => a + p.y, 0) / 4 / 12);
          const key = `${cx}:${cy}:${qr.dimension || 0}`;
          const old = found.get(key);
          if (!old || (!qr.isRaw && old.isRaw) || candidateArea(qr) > candidateArea(old)) found.set(key, qr);
        }
      }
      return Array.from(found.values()).sort((a, b) => candidateArea(b) - candidateArea(a)).slice(0, 8);
    }

    function collectLocatorOnlyCandidates(src, phase) {
      if (!window.jsQR || !jsQR.locateOnly) return [];
      let res = null;
      const t0 = performance.now();
      try {
        res = jsQR.locateOnly(src.imageData.data, src.width, src.height, {
          inversionAttempts: "dontInvert",
          singleLocate: true
        });
      } catch (e) {
        res = null;
      }
      const elapsed = performance.now() - t0;
      const list = Array.isArray(res) ? res : (res ? [res] : []);
      const fixedCount = list.filter(q => q && q.probeMeta && q.probeMeta.alignmentForcedExpected).length;
      recordPhase(phase + " / QR locator-only", elapsed, list.length ? "success" : "fail",
        `src=${src.width}x${src.height} locations=${list.length} alignFixed=${fixedCount}`);
      return list.sort((a, b) => candidateArea(b) - candidateArea(a)).slice(0, 3);
    }

    function decodeDMFromCarrier(src, qr, phase) {
      if (!jsQR.decodeQRMatrix) return null;
      let dm = null;
      const t0 = performance.now();
      try {
        dm = jsQR.decodeQRMatrix(src.imageData.data, src.width, src.height, qr, {
          minFinderScore: 0.62,
          requireManagementCode: true,
          requireNonEmptyText: true,
          expectedQrNo: 0
        });
      } catch (e) { dm = null; }
      const elapsed = performance.now() - t0;
      if (!dm) {
        recordPhase(phase + " / DM decode", elapsed, "fail", "no_dm");
        return null;
      }
      if (dm.isRaw) {
        recordPhase(phase + " / DM decode", elapsed, "raw", `finderScore=${(dm.finderScore || 0).toFixed(2)} symbol=${dm.symbolSize || "-"}`);
        return null;
      }
      const mgmt = parseStandardMgmt(dm.managementCode32 ?? dm.managementCode, dm.managementFlags16);
      if (!mgmt || mgmt.qrNo !== 0) {
        recordPhase(phase + " / DM decode", elapsed, "fail", `wrong_mgmt qrNo=${mgmt ? mgmt.qrNo : "-"}`);
        return null;
      }
      const carrierPoints = qrPoints(qr, src.map);
      matrixCarrier = {
        qr,
        points: carrierPoints,
        rect: rectFromPoints(carrierPoints),
        phase
      };
      recordPhase(phase + " / DM decode", elapsed, "success", `finderScore=${(dm.finderScore || 0).toFixed(2)} symbol=${dm.symbolSize || "-"}`);
      addTrace(`${phase}: DM確定 score=${(dm.finderScore || 0).toFixed(2)}`);
      return itemFromDM(dm);
    }

    function rectFromPoints(points, padRatio = 0.22) {
      if (!points || points.length < 4) return null;
      const xs = points.map(p => p.x);
      const ys = points.map(p => p.y);
      const x0 = Math.min(...xs), y0 = Math.min(...ys);
      const x1 = Math.max(...xs), y1 = Math.max(...ys);
      const pad = Math.max(24, Math.max(x1 - x0, y1 - y0) * padRatio);
      return {
        sx: Math.max(0, x0 - pad),
        sy: Math.max(0, y0 - pad),
        sw: Math.min(video.videoWidth, x1 - x0 + pad * 2),
        sh: Math.min(video.videoHeight, y1 - y0 + pad * 2)
      };
    }

    /*
    function acceptQR(qr, src, profile, phase) {
      if (!qr || !qr.location) return null;
      if (profile && profile.acceptRaw && qr.isRaw) {
        savedEncryptedQr = { raw: qr, phase };

        addTrace(`${phase}: QR部 raw候補保存`);
        return { rawOnly: true };
      }
      if (!qr.data || qr.isRaw) {
        recordEvent(`${phase}: QR rejected raw_or_empty`);
        return null;
      }
      const mgmt = parseStandardMgmt(qr.managementCode32 ?? qr.managementCode, qr.managementFlags16);
      if (!mgmt || mgmt.qrNo !== 1) {
        recordEvent(`${phase}: QR rejected wrong_mgmt qrNo=${mgmt ? mgmt.qrNo : "-"}`);
        return null;
      }
      addTrace(`${phase}: QR部確定 (${profile.label})`);

    */
    function acceptQR(qr, src, profile, phase) {
      if (!qr || !qr.location) return null;
      if (profile && profile.acceptRawAppEnc) {
        const hasBytes = !!(qr.isRaw && qr.dataBytes && qr.dataBytes.length);
        if (hasBytes) {
          savedEncryptedQr = {
            raw: {
              ...qr,
              encryptedDataBytes: Array.from(qr.dataBytes),
              dataBytes: Array.from(qr.dataBytes)
            },
            phase
          };
          recordEvent(`${phase}: QR appEnc raw dataBytes saved`);
          addTrace(`${phase}: QR appEnc raw dataBytes saved`);
          return { rawOnly: true };
        }
        if (qr.isRaw) {
          recordEvent(`${phase}: QR raw rejected no_dataBytes`);
          return null;
        }
      }
      if (!qr.data || qr.isRaw) {
        recordEvent(`${phase}: QR rejected raw_or_empty`);
        return null;
      }
      const mgmt = parseStandardMgmt(qr.managementCode32 ?? qr.managementCode, qr.managementFlags16);
      if (!mgmt || mgmt.qrNo !== 1) {
        recordEvent(`${phase}: QR rejected wrong_mgmt qrNo=${mgmt ? mgmt.qrNo : "-"}`);
        return null;
      }
      addTrace(`${phase}: QR fixed (${profile.label})`);
      return itemFromQR(qr, src.map);
    }

    function tryDecodeQRPart(src, profile, phase) {
      const optsList = profile && profile.optsList ? profile.optsList : [{ multi: true }];
      for (const base of optsList) {
        const opt = { multi: true, extractRawForFailed: true, ...base };
        let res = null;
        const t0 = performance.now();
        const probeCollector = [];
        opt.debugProbe = true;
        opt.probeCollector = probeCollector;
        try { res = jsQR(src.imageData.data, src.width, src.height, opt); } catch (e) { res = null; }
        const elapsed = performance.now() - t0;
        const list = Array.isArray(res) ? res : (res ? [res] : []);
        recordPhase(phase + " / QR decode", elapsed, list.length ? "success" : "fail",
          `src=${src.width}x${src.height} opts=${opt.sysEncDecode ? "sysenc" : (opt.appEncMask ? "appmask" : "plain")} results=${list.length} probes=${probeCollector.length || 0}`);
        for (const qr of list) {
          const hit = acceptQR(qr, src, profile, phase);
          if (hit) return hit;
        }
      }
      return null;
    }

    function itemFromResumedQR(decoded, rawHolder) {
      if (!decoded) return null;
      const raw = rawHolder && rawHolder.raw ? rawHolder.raw : null;
      return {
        text: decoded.data || decoded.text || "",
        data: decoded.data || decoded.text || "",
        binaryData: decoded.bytes || decoded.binaryData || [],
        chunks: decoded.chunks || [],
        managementCode: decoded.managementCode,
        managementCode32: decoded.managementCode32,
        managementFlags16: decoded.managementFlags16,
        managementExt32: decoded.managementExt32,
        creationDateTimeExt32: decoded.creationDateTimeExt32,
        expiryExt32: decoded.expiryExt32,
        readerIdExt32: decoded.readerIdExt32,
        locationLatExt24: decoded.locationLatExt24,
        locationLonExt24: decoded.locationLonExt24,
        municipalityExt24: decoded.municipalityExt24,
        codewords: decoded.codewords,
        dataBytes: decoded.dataBytes,
        version: decoded.version || (raw && raw.version),
        dimension: raw && raw.dimension,
        location: raw && raw.location,
        points: raw && raw.location ? qrPoints(raw) : null,
        rawPhase: rawHolder && rawHolder.phase
      };
    }

    function tryFinishFromSavedEncryptedQr() {
      if (!savedEncryptedQr || !savedEncryptedQr.raw || !appMask || !window.jsQR || !jsQR.resumeDecode) return false;
      const t0 = performance.now();
      let decoded = null;
      try {
        decoded = jsQR.resumeDecode(savedEncryptedQr.raw, Array.from(appMask));
      } catch (e) {
        decoded = null;
      }
      const elapsed = performance.now() - t0;
      if (!decoded) {
        recordPhase("password / resumeDecode", elapsed, "fail", `phase=${savedEncryptedQr.phase || "-"}`);
        recordEvent("saved raw resumeDecode failed");
        return false;
      }
      const mgmt = parseStandardMgmt(decoded.managementCode32 ?? decoded.managementCode, decoded.managementFlags16);
      if (!mgmt || mgmt.qrNo !== 1) {
        recordPhase("password / resumeDecode", elapsed, "fail", `wrong_mgmt qrNo=${mgmt ? mgmt.qrNo : "-"}`);
        recordEvent(`saved raw resumeDecode rejected qrNo=${mgmt ? mgmt.qrNo : "-"}`);
        return false;
      }
      recordPhase("password / resumeDecode", elapsed, "success", `phase=${savedEncryptedQr.phase || "-"}`);
      recordEvent("saved raw resumeDecode success");
      secondQR = itemFromResumedQR(decoded, savedEncryptedQr);
      showResult();
      return true;
    }

    async function runMatrixLadder(target, profile, opts = {}) {
      if (!video.videoWidth) return null;

      if (target === "M2_QR" && matrixCarrier && matrixCarrier.rect) {
        const crop = cropVideo(matrixCarrier.rect);
        if (crop) {
          const phase = opts.immediate ? "F0.5 carrier同フレームcrop" : "F0 carrier幾何crop";
          recordEvent(`${phase}: crop ${crop.width}x${crop.height}`);
          const hit = tryDecodeQRPart(crop, profile, phase);
          if (hit) return hit;
        }
      }

      if (barcodeDetector) {
        try {
          const bdT0 = performance.now();
          const boxes = await barcodeDetector.detect(video);
          const bdElapsed = performance.now() - bdT0;
          recordPhase((target === "M1_DM" ? "Stage1" : "Stage3") + " / F1 BarcodeDetector", bdElapsed, boxes && boxes.length ? "success" : "fail", `bbox=${boxes ? boxes.length : 0}`);
          const sorted = Array.from(boxes || []).filter(b => b.boundingBox).sort((a, b) => {
            return (b.boundingBox.width * b.boundingBox.height) - (a.boundingBox.width * a.boundingBox.height);
          }).slice(0, 3);
          for (const b of sorted) {
            const bb = b.boundingBox;
            const pad = Math.max(70, Math.max(bb.width, bb.height) * 0.55);
            const crop = cropVideo({ sx: bb.x - pad, sy: bb.y - pad, sw: bb.width + pad * 2, sh: bb.height + pad * 2 });
            if (!crop) continue;
            recordEvent(`F1 BD crop: ${Math.round(bb.x)},${Math.round(bb.y)} ${Math.round(bb.width)}x${Math.round(bb.height)} -> ${crop.width}x${crop.height}`);
            if (target === "M1_DM") {
              for (const qr of collectQRCandidates(crop, null)) {
                const dm = decodeDMFromCarrier(crop, qr, "F1 BD carrier crop");
                if (dm) return dm;
              }
            } else {
              const hit = tryDecodeQRPart(crop, profile, "F1 BD carrier crop");
              if (hit) return hit;
            }
          }
        } catch (e) {}
      }

      if (target === "M1_DM" && window.jsQR && jsQR.locateOnly) {
        const phase = "F1.5 jsQR locator-only 960";
        const src = frameAt(MAX_DIM_FAST);
        recordEvent(`${phase}: frame ${src.width}x${src.height}`);
        for (const qr of collectLocatorOnlyCandidates(src, phase)) {
          const videoQr = mapQrLocation(qr, src.map);
          const rect = rectFromPoints(qrPoints(videoQr), 0.28);
          const crop = rect && cropVideo(rect);
          if (!crop) continue;
          const cropQr = mapQrLocation(videoQr, p => ({ x: p.x - crop.rect.sx, y: p.y - crop.rect.sy }));
          recordEvent(`${phase}: crop ${crop.width}x${crop.height}`);
          const dm = decodeDMFromCarrier(crop, cropQr, phase + " crop");
          if (dm) return dm;
        }
      }

      const scales = opts.stage3 ? [MAX_DIM_FAST, MAX_DIM_ALT, Math.max(video.videoWidth, video.videoHeight)] : [MAX_DIM_FAST, MAX_DIM_ALT];
      for (const maxDim of scales) {
        const src = frameAt(maxDim);
        const phase = maxDim === MAX_DIM_FAST ? "F2 960 full" : (maxDim === MAX_DIM_ALT ? "F3 720 full" : "F4 full");
        recordEvent(`${phase}: frame ${src.width}x${src.height}`);
        if (target === "M1_DM") {
          for (const qr of collectQRCandidates(src, null)) {
            const dm = decodeDMFromCarrier(src, qr, phase);
            if (dm) return dm;
          }
        } else {
          const hit = tryDecodeQRPart(src, profile, phase);
          if (hit) return hit;
        }
      }
      return null;
    }

    async function handleFrame() {
      if (!isScanning || isProcessing) return;
      isProcessing = true;
      frameNo++;
      if (debugStats) {
        debugStats.frames.total++;
        if (!firstDM) debugStats.frames.stage1++;
        else debugStats.frames.stage3++;
      }
      drawOverlay();
      try {
        if (!firstDM) {
          setStage("stage1");
          setStatus("Stage1: DM部を探索中...");
          const dm = await runMatrixLadder("M1_DM", { label: "DM plain" });
          if (dm) {
            firstDM = dm;
            const mgmt = parseStandardMgmt(dm.managementCode32 ?? dm.managementCode, dm.managementFlags16);
            matrixProfile = buildMatrixProfile(mgmt);
            if (!matrixConditionsChecked) {
              matrixConditionsChecked = true;
              recordEvent("condition check started");
              const condition = await ensureMatrixConditionsAllowed(firstDM);
              if (!condition.ok) {
                showConditionRejected(condition.message);
                return;
              }
              recordEvent("condition check passed");
            }
            if (mgmt && mgmt.sameDataFlag) {
              secondQR = { text: firstDM.text, data: firstDM.text, points: matrixCarrier && matrixCarrier.points };
              showResult();
              return;
            }
            setStage("pre");
            setStatus(`即時プリロケート: QR部 ${matrixProfile.label}`);
            const pre = await runMatrixLadder("M2_QR", matrixProfile, { immediate: true });
            if (await dispatchM2(pre)) return;
          }
        } else {
          setStage("stage3");
          setStatus(`Stage3: QR部 ${matrixProfile.label} 探索中...`);
          const hit = await runMatrixLadder("M2_QR", matrixProfile, { stage3: true });
          if (await dispatchM2(hit)) return;
        }
      } finally {
        isProcessing = false;
      }
      if (isScanning) requestAnimationFrame(handleFrame);
    }

    async function dispatchM2(hit) {
      if (!hit) return false;
      if (hit.rawOnly) {
        isScanning = false;
        isProcessing = false;
        showPassword();
        return true;
      }
      secondQR = hit;
      if (matrixProfile && matrixProfile.kind === "digitalsign") {
        const verify = await verifyMatrixSignature(secondQR.text);
        showResult(verify);
      } else {
        showResult();
      }
      return true;
    }

    async function sha256Bytes(input) {
      const buf = await crypto.subtle.digest("SHA-256", input);
      return new Uint8Array(buf);
    }

    async function deriveMaskFromPassword(password, neededBytes, creationDateTimeExt32) {
      const pwBytes = new TextEncoder().encode(password);
      let input = pwBytes;
      if (creationDateTimeExt32 !== undefined && creationDateTimeExt32 !== null) {
        const dt = new Uint8Array(4);
        dt[0] = (creationDateTimeExt32 >>> 24) & 255;
        dt[1] = (creationDateTimeExt32 >>> 16) & 255;
        dt[2] = (creationDateTimeExt32 >>> 8) & 255;
        dt[3] = creationDateTimeExt32 & 255;
        input = new Uint8Array(pwBytes.length + 4);
        input.set(pwBytes);
        input.set(dt, pwBytes.length);
      }
      let h = await sha256Bytes(input);
      const out = new Uint8Array(neededBytes);
      let off = 0;
      while (off < neededBytes) {
        const n = Math.min(h.length, neededBytes - off);
        out.set(h.subarray(0, n), off);
        off += n;
        if (off < neededBytes) h = await sha256Bytes(h);
      }
      return out;
    }

    function bigMod(a, m) { return ((a % m) + m) % m; }
    function modInverse(a, m) {
      a = bigMod(a, m);
      let oldR = a, r = m, oldS = 1n, s = 0n;
      while (r !== 0n) {
        const q = oldR / r;
        [oldR, r] = [r, oldR - q * r];
        [oldS, s] = [s, oldS - q * s];
      }
      return bigMod(oldS, m);
    }
    function pointAdd(P, Q) {
      if (!P) return Q;
      if (!Q) return P;
      const { p, a } = SECP160R1;
      if (P.x === Q.x && P.y !== Q.y) return null;
      const m = P.x === Q.x && P.y === Q.y
        ? bigMod((3n * P.x * P.x + a) * modInverse(2n * P.y, p), p)
        : bigMod((Q.y - P.y) * modInverse(Q.x - P.x, p), p);
      const x = bigMod(m * m - P.x - Q.x, p);
      const y = bigMod(m * (P.x - x) - P.y, p);
      return { x, y };
    }
    function pointMultiply(k, P) {
      let R = null, Q = { x: P.x, y: P.y };
      while (k > 0n) {
        if (k & 1n) R = pointAdd(R, Q);
        Q = pointAdd(Q, Q);
        k >>= 1n;
      }
      return R;
    }
    function bytesToBigInt(bytes) {
      let v = 0n;
      for (const b of bytes) v = (v << 8n) + BigInt(b);
      return v;
    }
    async function ecdsaVerify(hashInputBytes, sigR, sigS, pubKeyHex) {
      const hashValue = await sha256Bytes(hashInputBytes);
      const z = bytesToBigInt(hashValue) >> BigInt(Math.max(0, hashValue.length * 8 - 160));
      const r = bytesToBigInt(sigR);
      const s = bytesToBigInt(sigS);
      const { n, Gx, Gy } = SECP160R1;
      if (r <= 0n || r >= n || s <= 0n || s >= n) return false;
      const w = modInverse(s, n);
      const u1 = bigMod(z * w, n);
      const u2 = bigMod(r * w, n);
      const G = { x: Gx, y: Gy };
      const Q = { x: BigInt("0x" + pubKeyHex.substring(2, 42)), y: BigInt("0x" + pubKeyHex.substring(42, 82)) };
      const R = pointAdd(pointMultiply(u1, G), pointMultiply(u2, Q));
      return !!R && bigMod(R.x, n) === r;
    }

    async function verifyMatrixSignature(signatureText) {
      try {
        const binary = atob(signatureText || "");
        if (binary.length !== 42) throw new Error("invalid length");
        const sign = new Uint8Array(42);
        for (let i = 0; i < 42; i++) sign[i] = binary.charCodeAt(i);
        const keyId = (sign[0] << 8) | sign[1];
        const pub = ECDSA_PUBLIC_KEYS[keyId];
        const payload = new Uint8Array((firstDM && firstDM.codewords) || []);
        const verified = !!(pub && await ecdsaVerify(payload, sign.slice(2, 22), sign.slice(22, 42), pub));
        return { verified, keyId, senderName: ECDSA_SENDER_NAMES[keyId] || `ID:${keyId}` };
      } catch (e) {
        return { verified: false, keyId: 0, senderName: "Invalid signature" };
      }
    }

      setStage(null);

      setScanUiActive(false);
      recordEvent(`condition rejected: ${message}`);
      const report = buildDebugReport("rejected");
      saveDebugLog("rejected", report);
      const mgmt = firstDM ? parseStandardMgmt(firstDM.managementCode32 ?? firstDM.managementCode, firstDM.managementFlags16) : null;
      $("resultTitle").textContent = "QR Matrix 条件不一致";
      $("resultDm").textContent = firstDM ? firstDM.text : "-";
      $("resultQr").textContent = secondQR ? secondQR.text : "-";
      $("resultQrCard").style.display = "";
      $("resultDmMeta").textContent = mgmt
        ? `種別=${matrixProfile ? matrixProfile.label : "-"} / readLimit=${mgmt.readLimitBits}`
        : "";
      $("resultQrMeta").textContent = message || "読取条件を満たしていません";
      $("signatureCard").style.display = "none";
      $("resultTrace").textContent = report;
      $("resultScreen").style.display = "flex";
      $("startBtn").disabled = false;
      $("stopBtn").disabled = true;
    }

    function showResult(signature = null) {
      isScanning = false;
      isProcessing = false;
      clearScanTimeout();
      setStage(null);
      drawOverlay();
      const outcome = signature ? (signature.verified ? "completed_verified" : "completed_signature_failed") : "completed";
      recordEvent(outcome);
      if (firstDM) recordReadCountIfNeeded(firstDM);
      const report = buildDebugReport(outcome);
      saveDebugLog(outcome, report);
      const mgmt = firstDM ? parseStandardMgmt(firstDM.managementCode32 ?? firstDM.managementCode, firstDM.managementFlags16) : null;
      $("resultTitle").textContent = signature ? "QR Matrix 電子署名結果" : "QR Matrix 読取結果";
      $("resultDm").textContent = firstDM ? firstDM.text : "-";
      $("resultQr").textContent = secondQR ? secondQR.text : "-";
      $("resultDmMeta").textContent = mgmt ? `種別=${matrixProfile ? matrixProfile.label : "-"} / readLimit=${mgmt.readLimitBits}` : "";
      $("resultQrCard").style.display = signature ? "none" : "";
      $("resultQrMeta").textContent = secondQR && secondQR.version ? `version=${secondQR.version.versionNumber || secondQR.version}` : "";
      $("resultTrace").textContent = report;
      if (signature) {
        $("signatureCard").style.display = "";
        $("signatureText").innerHTML = signature.verified
          ? `<span class="ok">認証できました</span>\n署名者: ${signature.senderName}`
          : `<span class="bad">認証できませんでした</span>\n署名者: ${signature.senderName}`;
      } else {
        $("signatureCard").style.display = "none";
      }
      $("resultScreen").style.display = "flex";
      setScanUiActive(false);
      $("startBtn").disabled = false;
      $("stopBtn").disabled = true;
    }

    async function startCamera() {
      if (stream) return;
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
      await setupCameraZoom();
      if ("BarcodeDetector" in window) {
        try { barcodeDetector = new BarcodeDetector({ formats: ["qr_code"] }); } catch (e) { barcodeDetector = null; }
      }
    }

    function getVideoTrack() {
      return stream && stream.getVideoTracks ? stream.getVideoTracks()[0] : null;
    }

    function updateZoomUi() {
      const label = $("zoomLabel");
      const outBtn = $("zoomOutBtn");
      const inBtn = $("zoomInBtn");
      if (!zoomState || !zoomState.supported) {
        if (label) label.textContent = "no zoom";
        if (outBtn) outBtn.disabled = true;
        if (inBtn) inBtn.disabled = true;
        return;
      }
      if (label) label.textContent = `${zoomState.value.toFixed(1)}x`;
      if (outBtn) outBtn.disabled = zoomState.value <= zoomState.min + 0.001;
      if (inBtn) inBtn.disabled = zoomState.value >= zoomState.max - 0.001;
    }

    async function applyZoom(value) {
      const track = getVideoTrack();
      if (!track || !track.applyConstraints || !zoomState || !zoomState.supported) return false;
      const next = Math.min(zoomState.max, Math.max(zoomState.min, value));
      try {
        await track.applyConstraints({ advanced: [{ zoom: next }] });
        zoomState.value = next;
        updateZoomUi();
        recordEvent(`zoom=${next.toFixed(2)}`);
        return true;
      } catch (e) {
        recordEvent(`zoom apply failed: ${e && e.name ? e.name : "error"}`);
        return false;
      }
    }

    async function setupCameraZoom() {
      const track = getVideoTrack();
      zoomState = { supported: false, min: 1, max: 1, step: 0.1, value: 1 };
      if (!track || !track.getCapabilities || !track.applyConstraints) {
        updateZoomUi();
        return;
      }
      let caps = {};
      try { caps = track.getCapabilities() || {}; } catch (e) { caps = {}; }
      if (!caps.zoom) {
        updateZoomUi();
        return;
      }
      const settings = track.getSettings ? track.getSettings() : {};
      const min = Number.isFinite(caps.zoom.min) ? caps.zoom.min : 1;
      const max = Number.isFinite(caps.zoom.max) ? caps.zoom.max : min;
      const step = Number.isFinite(caps.zoom.step) && caps.zoom.step > 0 ? caps.zoom.step : Math.max(0.1, (max - min) / 20);
      const current = Number.isFinite(settings.zoom) ? settings.zoom : min;
      zoomState = { supported: max > min, min, max, step, value: current };
      if (zoomState.supported) {
        await applyZoom(Math.min(max, Math.max(min, min * 1.7)));
      } else {
        updateZoomUi();
      }
    }

    function changeZoom(direction) {
      if (!zoomState || !zoomState.supported) return;
      applyZoom(zoomState.value + zoomState.step * direction);
    }

    function resetScanState() {
      clearScanTimeout();
      firstDM = null;
      secondQR = null;
      matrixProfile = null;
      matrixCarrier = null;
      savedEncryptedQr = null;
      appMask = null;
      trace = [];
      frameNo = 0;
      matrixConditionsChecked = false;
      currentMatrixReadCountRecordedKey = null;
      debugStats = newDebugStats();
      scanStartedPerf = performance.now();
      scanStartedIso = debugStats.startedIso;
      debugSavedForCurrentScan = false;
      octx.clearRect(0, 0, overlay.width, overlay.height);
    }

    async function startScan() {
      if (!window.jsQR || !jsQR.decodeQRMatrix) {
        alert("jsQR.js QR Matrix extension is not loaded.");
        return;
      }
      await startCamera();
      startWatchingPosition();
      resetScanState();
      $("resultScreen").style.display = "none";
      $("passwordScreen").style.display = "none";
      $("startBtn").disabled = true;
      $("stopBtn").disabled = false;
      isScanning = true;
      isProcessing = false;
      setScanUiActive(true);
      setStatus("Stage1: searching DM part...");
      recordEvent("scan start");
      startScanTimeout();
      requestAnimationFrame(handleFrame);
    }

    function stopScan() {
      isScanning = false;
      isProcessing = false;
      clearScanTimeout();
      setStage(null);
      setScanUiActive(false);
      setStatus("Stopped");
      $("startBtn").disabled = false;
      $("stopBtn").disabled = true;
    }

    $("startBtn").addEventListener("click", startScan);
    $("stopBtn").addEventListener("click", stopScan);
    $("copyLogsBtn").addEventListener("click", copyAllDebugLog);
    $("clearLogsBtn").addEventListener("click", clearDebugLog);
    $("loginBtn").addEventListener("click", doLogin);
    $("logoutBtn").addEventListener("click", doLogout);
    $("modeSwitchBtn").addEventListener("click", () => {
      $("resultScreen").style.display = "none";
      $("passwordScreen").style.display = "none";
      stopScan();
    });
    $("cameraScanAgainBtn").addEventListener("click", () => {
      $("resultScreen").style.display = "none";
      $("passwordScreen").style.display = "none";
      startScan();
    });
    $("zoomOutBtn").addEventListener("click", () => changeZoom(-1));
    $("zoomInBtn").addEventListener("click", () => changeZoom(1));
    $("scanAgainBtn").addEventListener("click", () => { $("resultScreen").style.display = "none"; startScan(); });
    $("passwordCancelBtn").addEventListener("click", () => { $("passwordScreen").style.display = "none"; stopScan(); });
    $("passwordOkBtn").addEventListener("click", async () => {
      const pw = $("passwordInput").value;
      if (!pw) { alert("Enter password."); return; }
      $("passwordScreen").style.display = "none";
      setStatus("Generating password mask...");
      appMask = await deriveMaskFromPassword(pw, 5000, firstDM && firstDM.creationDateTimeExt32);
      matrixProfile = buildMatrixProfile(parseStandardMgmt(firstDM.managementCode32 ?? firstDM.managementCode, firstDM.managementFlags16));
      if (tryFinishFromSavedEncryptedQr()) return;
      recordEvent("fallback to appMask scan after saved raw failed");
      isScanning = true;
      isProcessing = false;
      setScanUiActive(true);
      recordEvent("password mask generated; resume scan");
      startScanTimeout();
      requestAnimationFrame(handleFrame);
    });
    initLogin();
    updateDebugLogCount();
